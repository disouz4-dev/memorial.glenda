<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Memorial Glenda 💚</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #25d366;
      --serif: 'Playfair Display', Georgia, serif;
      --sans:  'Inter', -apple-system, sans-serif;
    }

    html, body { height: 100%; background: #000; color: #fff; font-family: var(--sans); -webkit-font-smoothing: antialiased; overflow-x: hidden; }

    /* ── Slideshow de fundo ─────────────────── */
    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: #111;
    }

    .slide {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 1.8s ease;
    }
    .slide.ativo { opacity: 1; }

    /* Foto já em 1920×1080 — cobre tudo sem truques */
    .slide-foto {
      position: absolute;
      inset: 0;
    }
    .slide-foto img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Gradiente escuro no rodapé para legibilidade do texto */
    .slide-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.08) 0%,
        rgba(0,0,0,0.0)  35%,
        rgba(0,0,0,0.65) 72%,
        rgba(0,0,0,0.93) 100%
      );
    }

    /* ── Conteúdo ───────────────────────────── */
    .page {
      position: relative;
      z-index: 1;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding: 0 1.5rem max(160px, calc(130px + env(safe-area-inset-bottom)));
      text-align: center;
      padding-top: 60px;
    }

    .nome {
      font-family: var(--serif);
      font-size: clamp(3rem, 12vw, 6rem);
      font-weight: 400;
      letter-spacing: 0.06em;
      color: #fff;
      line-height: 1;
      margin-bottom: 0.5rem;
      text-shadow: 0 2px 30px rgba(0,0,0,0.7);
    }
    .subtitulo {
      font-size: 0.85rem;
      font-weight: 300;
      letter-spacing: 0.28em;
      color: rgba(255,255,255,0.6);
      text-transform: uppercase;
      margin-bottom: 1.4rem;
    }
    .linha {
      width: 48px;
      height: 1px;
      background: var(--green);
      margin: 0 auto 1.4rem;
      opacity: 0.9;
    }
    .frase {
      font-family: var(--serif);
      font-style: italic;
      font-size: clamp(0.95rem, 2.5vw, 1.2rem);
      color: rgba(255,255,255,0.82);
      line-height: 1.75;
      max-width: 440px;
      margin-bottom: 2.2rem;
      text-shadow: 0 1px 12px rgba(0,0,0,0.6);
    }

    /* ── Botões ─────────────────────────────── */
    .btns { display: flex; gap: 0.9rem; justify-content: center; flex-wrap: wrap; margin-bottom: 2.5rem; }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.55rem;
      padding: 0.85rem 1.8rem;
      border-radius: 50px;
      text-decoration: none;
      font-family: var(--sans);
      font-size: 0.92rem;
      font-weight: 500;
      transition: all 0.22s;
      letter-spacing: 0.02em;
    }
    .btn svg { width: 18px; height: 18px; flex-shrink: 0; }
    .btn-green {
      background: var(--green);
      color: #fff;
      box-shadow: 0 4px 22px rgba(37,211,102,0.4);
    }
    .btn-green:hover { background: #1db954; transform: translateY(-2px); box-shadow: 0 8px 28px rgba(37,211,102,0.5); }
    .btn-ghost {
      background: rgba(255,255,255,0.1);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.22);
      backdrop-filter: blur(8px);
    }
    .btn-ghost:hover { background: rgba(255,255,255,0.2); transform: translateY(-2px); }

    /* ── Stats ──────────────────────────────── */
    .stats { display: flex; gap: 2rem; justify-content: center; flex-wrap: wrap; padding-bottom: 0.5rem; }
    .stat { text-align: center; }
    .stat-n { display: block; font-size: 1.4rem; font-weight: 600; color: var(--green); line-height: 1; }
    .stat-l { font-size: 0.7rem; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 1.5px; }
  </style>
  <link rel="stylesheet" href="assets/css/player.css">
</head>
<body>

  <!-- Background slideshow -->
  <div class="bg" id="bg"></div>

  <!-- Conteúdo -->
  <div class="page">
    <h1 class="nome">Glenda</h1>
    <p class="subtitulo">Para sempre em nossos corações</p>
    <div class="linha"></div>
    <p class="frase">
      "Cada mensagem, cada áudio, cada foto —<br>
      tudo aqui é amor guardado para não se perder."
    </p>
    <div class="btns">
      <a href="chat.html" class="btn btn-green">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
        Ver Conversa
      </a>
      <a href="galeria.html" class="btn btn-ghost">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>
        Galeria de Fotos
      </a>
    </div>
    <div class="stats">
      <div class="stat"><span class="stat-n">24.858</span><span class="stat-l">mensagens</span></div>
      <div class="stat"><span class="stat-n">1.206</span><span class="stat-l">fotos</span></div>
      <div class="stat"><span class="stat-n">3.551</span><span class="stat-l">áudios</span></div>
      <div class="stat"><span class="stat-n">40</span><span class="stat-l">vídeos</span></div>
    </div>
  </div>

  <script>
  fetch('assets/fotos_capa.json')
    .then(r => r.json())
    .then(lista => {
      if (!lista.length) return;
      const bg   = document.getElementById('bg');
      const BASE = 'assets/media/fotos_wide/';

      const slides = lista.map(item => {
        const div = document.createElement('div');
        div.className = 'slide';

        const fotoWrap = document.createElement('div');
        fotoWrap.className = 'slide-foto';

        const img = document.createElement('img');
        img.src = `${BASE}${item.file}`;
        img.alt = 'Glenda';
        img.style.objectPosition = `center ${item.face_y ?? 30}%`;

        fotoWrap.appendChild(img);
        div.appendChild(fotoWrap);

        const ov = document.createElement('div');
        ov.className = 'slide-overlay';
        div.appendChild(ov);

        bg.appendChild(div);
        return div;
      });

      let cur = 0;
      slides[0].classList.add('ativo');

      if (slides.length > 1) {
        setInterval(() => {
          slides[cur].classList.remove('ativo');
          cur = (cur + 1) % slides.length;
          slides[cur].classList.add('ativo');
        }, 7000);
      }
    })
    .catch(() => {});
  </script>

  <script src="assets/js/player.js"></script>
</body>
</html>
