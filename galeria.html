<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Fotos — Glenda</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      color: #fff;
      font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ─── Header ─────────────────────────────── */
    .hdr {
      background: rgba(0,0,0,0.85);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      border-bottom: 0.5px solid rgba(255,255,255,0.15);
      padding: 10px 16px 8px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .hdr-back {
      display: flex;
      align-items: center;
      gap: 2px;
      color: #32d74b;
      font-size: 17px;
      text-decoration: none;
    }
    .hdr-back svg { width: 10px; height: 16px; }
    .hdr-mid { flex: 1; text-align: center; }
    .hdr-titulo { font-size: 17px; font-weight: 600; }
    .hdr-sub    { font-size: 12px; color: rgba(255,255,255,0.45); margin-top: 1px; }

    /* ─── Segmented control (tipo iOS) ───────── */
    .seg {
      display: flex;
      background: rgba(255,255,255,0.12);
      border-radius: 8px;
      padding: 2px;
      gap: 0;
    }
    .seg-btn {
      flex: 1;
      padding: 4px 10px;
      border: none;
      border-radius: 6px;
      background: none;
      color: rgba(255,255,255,0.55);
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
    }
    .seg-btn.ativo {
      background: rgba(255,255,255,0.18);
      color: #fff;
    }

    /* ─── Scroll ─────────────────────────────── */
    .scroll {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 130px;
    }
    .scroll::-webkit-scrollbar { display: none; }

    /* ─── Grupos por mês ─────────────────────── */
    .grupo { margin-bottom: 4px; }

    .grupo-header {
      padding: 20px 16px 6px;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.4px;
      color: #fff;
    }
    .grupo-header small {
      font-size: 13px;
      font-weight: 400;
      color: rgba(255,255,255,0.4);
      margin-left: 6px;
      letter-spacing: 0;
    }

    /* ─── Grid 4 colunas ─────────────────────── */
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 2px;
    }
    @media (max-width: 360px) {
      .grid { grid-template-columns: repeat(3, 1fr); }
    }

    .foto {
      aspect-ratio: 1 / 1;
      overflow: hidden;
      cursor: pointer;
      background: #111;
      position: relative;
    }
    .foto img, .foto video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .foto:active { opacity: 0.75; }

    .video-badge {
      position: absolute;
      bottom: 4px;
      right: 5px;
      pointer-events: none;
    }
    .video-badge svg {
      width: 15px;
      height: 15px;
      fill: #fff;
      filter: drop-shadow(0 1px 3px rgba(0,0,0,0.9));
    }

    /* ─── Loader ─────────────────────────────── */
    .loader {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 50vh;
      gap: 12px;
      color: rgba(255,255,255,0.3);
      font-size: 14px;
    }
    .spin {
      width: 28px; height: 28px;
      border: 2px solid rgba(255,255,255,0.1);
      border-top-color: #32d74b;
      border-radius: 50%;
      animation: giro 0.7s linear infinite;
    }
    @keyframes giro { to { transform: rotate(360deg); } }

    /* ─── Lightbox ───────────────────────────── */
    #lb {
      display: none;
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 9000;
      flex-direction: column;
    }
    #lb.aberto { display: flex; }

    .lb-topo {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      position: absolute;
      top: 0; left: 0; right: 0;
      z-index: 2;
      background: linear-gradient(rgba(0,0,0,0.6), transparent);
    }
    .lb-topo button {
      background: none;
      border: none;
      color: #32d74b;
      font-size: 17px;
      font-family: inherit;
      cursor: pointer;
      padding: 4px 0;
    }
    .lb-topo-info { text-align: center; }
    .lb-topo-data  { font-size: 14px; font-weight: 500; color: #fff; }
    .lb-topo-num   { font-size: 12px; color: rgba(255,255,255,0.45); }

    .lb-media {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      padding: 60px 0 0;
    }
    .lb-media img {
      max-width: 100%;
      max-height: 75dvh;
      object-fit: contain;
    }
    .lb-media video {
      max-width: 100%;
      max-height: 75dvh;
    }

    .lb-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(6px);
      border: none;
      color: #fff;
      width: 36px; height: 36px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 18px;
      display: flex; align-items: center; justify-content: center;
    }
    .lb-nav.esq { left: 10px; }
    .lb-nav.dir { right: 10px; }

    /* ─── Tira de thumbs ─────────────────────── */
    .lb-tira {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: linear-gradient(transparent, rgba(0,0,0,0.8));
      padding: 8px 0 max(16px, env(safe-area-inset-bottom));
    }
    .lb-tira-inner {
      display: flex;
      gap: 3px;
      padding: 0 12px;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      scrollbar-width: none;
    }
    .lb-tira-inner::-webkit-scrollbar { display: none; }

    .lb-thumb {
      width: 52px; height: 52px;
      flex-shrink: 0;
      border-radius: 5px;
      overflow: hidden;
      cursor: pointer;
      scroll-snap-align: center;
      border: 2.5px solid transparent;
      background: #222;
      transition: border-color 0.15s;
    }
    .lb-thumb.ativo { border-color: #fff; }
    .lb-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  </style>
  <link rel="stylesheet" href="assets/css/player.css">
</head>
<body>

  <!-- Header -->
  <div class="hdr">
    <a href="index.html" class="hdr-back">
      <svg viewBox="0 0 8 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="7,1 1,7 7,13"/></svg>
      Início
    </a>
    <div class="hdr-mid">
      <div class="hdr-titulo">Memórias</div>
      <div class="hdr-sub" id="hdr-sub">carregando…</div>
    </div>
    <div class="seg">
      <button class="seg-btn ativo" data-t="image">Fotos</button>
      <button class="seg-btn"       data-t="video">Vídeos</button>
      <button class="seg-btn"       data-t="all">Tudo</button>
    </div>
  </div>

  <!-- Conteúdo -->
  <div class="scroll" id="scroll">
    <div class="loader"><div class="spin"></div>Carregando…</div>
  </div>

  <!-- Lightbox -->
  <div id="lb">
    <div class="lb-topo">
      <button id="lb-fechar">Fechar</button>
      <div class="lb-topo-info">
        <div class="lb-topo-data" id="lb-data"></div>
        <div class="lb-topo-num"  id="lb-num"></div>
      </div>
      <button id="lb-salvar">⬇ Salvar</button>
    </div>

    <div class="lb-media" id="lb-media">
      <button class="lb-nav esq" id="lb-prev">‹</button>
      <div id="lb-conteudo"></div>
      <button class="lb-nav dir" id="lb-next">›</button>
    </div>

    <div class="lb-tira">
      <div class="lb-tira-inner" id="lb-tira"></div>
    </div>
  </div>

<script>
const MESES = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const BF = 'assets/media/fotos/';
const BV = 'assets/media/videos/';

let todos = [], exibidos = [], lbI = 0, tiraOk = false, curTipo = 'image';

fetch('assets/chat_data.json')
  .then(r => r.json())
  .then(d => {
    todos = d.messages
      .filter(m => m.type === 'image' || m.type === 'video')
      .sort((a, b) => {
        const ts = m => { const [dd,mm,yy] = m.date.split('/'); return +new Date(`${yy}-${mm}-${dd}T${m.time}`); };
        return ts(a) - ts(b);
      });
    const nf = todos.filter(m => m.type === 'image').length;
    const nv = todos.filter(m => m.type === 'video').length;
    document.getElementById('hdr-sub').textContent = `${nf.toLocaleString('pt-BR')} fotos · ${nv} vídeos`;
    filtrar();
  });

function filtrar() {
  exibidos = curTipo === 'all' ? todos : todos.filter(m => m.type === curTipo);
  tiraOk = false;
  renderizar();
}

// Tabs
document.querySelectorAll('.seg-btn').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('.seg-btn').forEach(x => x.classList.remove('ativo'));
    b.classList.add('ativo');
    curTipo = b.dataset.t;
    filtrar();
  });
});

// ── Render ──────────────────────────────────
function renderizar() {
  const scroll = document.getElementById('scroll');
  scroll.innerHTML = '';
  if (!exibidos.length) {
    scroll.innerHTML = '<p style="text-align:center;padding:40px;color:rgba(255,255,255,0.3)">Nenhum item.</p>';
    return;
  }

  // Agrupa por mês
  const grupos = {};
  exibidos.forEach((m, i) => {
    const [, mo, y] = m.date.split('/');
    const k = `${y}-${mo.padStart(2,'0')}`;
    (grupos[k] = grupos[k] || []).push({ m, i });
  });

  Object.keys(grupos).sort().forEach(k => {
    const [y, mo] = k.split('-');
    const label   = `${MESES[+mo - 1]}`;
    const items   = grupos[k];

    const g = document.createElement('div');
    g.className = 'grupo';

    const h = document.createElement('div');
    h.className = 'grupo-header';
    h.innerHTML = `${label} <small>${y} · ${items.length}</small>`;
    g.appendChild(h);

    const gr = document.createElement('div');
    gr.className = 'grid';
    items.forEach(({ m, i }) => gr.appendChild(mkFoto(m, i)));
    g.appendChild(gr);
    scroll.appendChild(g);
  });
}

function mkFoto(m, idx) {
  const c   = document.createElement('div');
  c.className = 'foto';
  const src = m.type === 'video' ? `${BV}${m.filename}` : `${BF}${m.filename}`;

  if (m.type === 'video') {
    const v = document.createElement('video');
    v.src = src; v.preload = 'metadata';
    v.onerror = () => c.style.display = 'none';
    c.appendChild(v);
    const ico = document.createElement('div');
    ico.className = 'video-badge';
    ico.innerHTML = '<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>';
    c.appendChild(ico);
  } else {
    const img = document.createElement('img');
    img.src = src; img.loading = 'lazy';
    img.onerror = () => c.style.display = 'none';
    c.appendChild(img);
  }

  c.addEventListener('click', () => abrirLb(idx));
  return c;
}

// ── Lightbox ─────────────────────────────────
function abrirLb(idx) {
  lbI = idx;
  document.getElementById('lb').classList.add('aberto');
  document.body.style.overflow = 'hidden';
  if (!tiraOk) buildTira();
  mostrarMedia();
}

function fecharLb() {
  const v = document.querySelector('#lb-conteudo video');
  if (v) v.pause();
  document.getElementById('lb').classList.remove('aberto');
  document.body.style.overflow = '';
}

function mostrarMedia() {
  const m   = exibidos[lbI];
  const src = m.type === 'video' ? `${BV}${m.filename}` : `${BF}${m.filename}`;
  const el  = document.getElementById('lb-conteudo');
  const pv  = el.querySelector('video');
  if (pv) pv.pause();

  el.innerHTML = m.type === 'video'
    ? `<video src="${src}" controls autoplay playsinline></video>`
    : `<img src="${src}">`;

  const [dd, mo, yy] = m.date.split('/');
  document.getElementById('lb-data').textContent = `${dd} de ${MESES[+mo-1]} de ${yy}`;
  document.getElementById('lb-num').textContent  = `${lbI + 1} / ${exibidos.length}`;
  document.getElementById('lb-salvar').onclick   = () => {
    Object.assign(document.createElement('a'), { href: src, download: m.filename }).click();
  };

  // Atualiza thumb ativo
  document.querySelectorAll('.lb-thumb').forEach((t, i) => t.classList.toggle('ativo', i === lbI));
  const ativo = document.querySelector('.lb-thumb.ativo');
  if (ativo) ativo.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
}

function buildTira() {
  const tira = document.getElementById('lb-tira');
  tira.innerHTML = '';
  exibidos.forEach((m, i) => {
    const src = m.type === 'video' ? `${BV}${m.filename}` : `${BF}${m.filename}`;
    const t   = document.createElement('div');
    t.className = 'lb-thumb' + (i === lbI ? ' ativo' : '');
    t.innerHTML = `<img src="${src}" loading="lazy">`;
    t.addEventListener('click', () => { lbI = i; mostrarMedia(); });
    tira.appendChild(t);
  });
  tiraOk = true;
}

function nav(d) {
  const v = document.querySelector('#lb-conteudo video');
  if (v) v.pause();
  lbI = (lbI + d + exibidos.length) % exibidos.length;
  mostrarMedia();
}

document.getElementById('lb-fechar').addEventListener('click', fecharLb);
document.getElementById('lb-prev').addEventListener('click', () => nav(-1));
document.getElementById('lb-next').addEventListener('click', () => nav(+1));

document.addEventListener('keydown', e => {
  if (!document.getElementById('lb').classList.contains('aberto')) return;
  if (e.key === 'Escape')     fecharLb();
  if (e.key === 'ArrowLeft')  nav(-1);
  if (e.key === 'ArrowRight') nav(+1);
});

// Swipe
let sx = 0;
document.getElementById('lb-media').addEventListener('touchstart', e => { sx = e.touches[0].clientX; }, { passive: true });
document.getElementById('lb-media').addEventListener('touchend',   e => {
  const dx = e.changedTouches[0].clientX - sx;
  if (Math.abs(dx) > 50) nav(dx < 0 ? 1 : -1);
});
</script>

<script src="assets/js/player.js"></script>
</body>
</html>
