<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galeria — Memorial Glenda 💚</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body class="galeria-page">

  <header class="wa-header">
    <a href="index.html" class="back-btn">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
    </a>
    <div class="wa-header-avatar">G</div>
    <div class="wa-header-info">
      <div class="wa-header-name">Galeria de Memórias</div>
      <div class="wa-header-sub" id="galeria-count">carregando...</div>
    </div>
  </header>

  <div class="galeria-tabs">
    <button class="tab-btn active" data-tab="fotos">📸 Fotos</button>
    <button class="tab-btn" data-tab="videos">🎬 Vídeos</button>
  </div>

  <main class="galeria-grid" id="galeria-grid">
    <div class="loading-spinner">
      <div class="spinner"></div>
      <p>Carregando galeria...</p>
    </div>
  </main>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" id="lb-close">✕</button>
    <div class="lightbox-nav">
      <button id="lb-prev">‹</button>
      <div class="lightbox-content" id="lb-content"></div>
      <button id="lb-next">›</button>
    </div>
    <div class="lightbox-caption" id="lb-caption"></div>
  </div>

  <script src="assets/js/galeria.js"></script>
</body>
</html>
